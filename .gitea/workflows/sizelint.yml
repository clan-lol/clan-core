# We also run sizelint in treefmt but that only runs it on the overall diff
# whereas we need the Git history so we can check each commit to prevent
# a commit adding a large file and another commit removing it in the same PR.
name: sizelint on each commit
on:
  pull_request:
    branches: [main]

jobs:
  sizelint:
    runs-on: nix
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint file sizes
        run: |
          FORMATTER=$(nix build .#formatter.x86_64-linux --print-out-paths)
          TREEFMT_CONF=$(grep -oP '(?<=--config-file=)\S+' "$FORMATTER/bin/treefmt")
          SIZELINT_CONF=$(grep -oP '/nix/store/\S*sizelint\.toml' "$TREEFMT_CONF")
          nix run nixpkgs#sizelint --inputs-from . -- check --config "$SIZELINT_CONF" --git "${{ gitea.event.pull_request.base.sha }}..${{ gitea.sha }}"
